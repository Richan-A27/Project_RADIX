<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADIX Talent Match</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<div class="container">
    <div class="card">

        <div class="header">
            <i class="fa-solid fa-brain profile-icon"></i>
            <h1>RADIX Talent Match</h1>
            <p>Cognitive Candidate Profile Builder</p>
        </div>


        <form action="/submit" method="POST" enctype="multipart/form-data">

            <!-- Cleaned Upload Box without Autofill -->
            <div class="upload-box">
                <i class="fa-solid fa-cloud-arrow-up pdf-icon"></i>
                <h3>Drop Resume Document Here or Click to Upload</h3>
                <input type="file" id="resume" name="resume">
            </div>

            <div class="section-title">
                Core Identity & Target Context
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@gmail.com">
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Academic Path</label>
                    <input type="text" id="education" name="education" placeholder="B.Tech Computer Science">
                </div>
                <div class="input-group">
                    <label>Preferred Aspiration Role</label>
                    <input type="text" id="preferred_role" name="preferred_role" placeholder="AI Engineer">
                </div>
            </div>

            <div class="input-group">
                <label>Functional Knowledge Elements (Skills)</label>
                <!-- Modern Interactive Tag UI Layout Context -->
                <div class="skills-wrapper">
                    <span class="skill-badge">Python <i class="fa-solid fa-xmark"></i></span>
                    <span class="skill-badge">Flask <i class="fa-solid fa-xmark"></i></span>
                    <span class="skill-badge">SQL <i class="fa-solid fa-xmark"></i></span>
                    <input type="text" id="skills" name="skills" placeholder="Add more..." style="display:inline-block; width:auto; flex:1; border:none; padding:4px; background:transparent; min-width:120px;">
                </div>
            </div>

            <div class="section-title">
                Application & Industry Experience
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Hackathon History</label>
                    <input type="text" id="hackathon" name="hackathon" placeholder="e.g. HackMIT '25">
                </div>
                <div class="input-group">
                    <label>Target Internship Node</label>
                    <input type="text" id="internship" name="internship" placeholder="e.g. ML Intern at OpenAI">
                </div>
            </div>

            <div class="input-group">
                <label>Verified Certifications</label>
                <input type="text" id="certification" name="certification" placeholder="e.g. AWS Certified Solutions Architect">
            </div>

            <button type="submit" class="submit-btn">
                <i class="fa-solid fa-circle-nodes"></i> Sync Candidate Profile to Talent Network
            </button>

        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
