<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Synchronized</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #262320 0%, #131211 100%);
            color: #e5e5e0;
        }

        .card {
            width: 520px;
            background: rgba(36, 34, 32, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 163, 115, 0.2);
            padding: 50px 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: premiumPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes premiumPop {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .circle {
            width: 84px;
            height: 84px;
            background: rgba(212, 163, 115, 0.1);
            border: 2px solid #d4a373;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px auto;
            box-shadow: 0 0 20px rgba(212, 163, 115, 0.2);
        }

        .circle i {
            font-size: 34px;
            color: #d4a373;
            filter: drop-shadow(0 0 5px rgba(212, 163, 115, 0.5));
        }

        h1 {
            color: #f5f5f0;
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        p {
            color: #a39f99;
            font-size: 15px;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .btn {
            padding: 13px 28px;
            text-decoration: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .home {
            background: rgba(212, 163, 115, 0.1);
            color: #d4a373;
            border: 1px solid rgba(212, 163, 115, 0.3);
        }

        .home:hover {
            background: rgba(212, 163, 115, 0.2);
            transform: translateY(-2px);
        }

        .new {
            background: linear-gradient(135deg, #d4a373 0%, #b5895a 100%);
            color: #131211;
            box-shadow: 0 4px 15px rgba(212, 163, 115, 0.2);
        }

        .new:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 163, 115, 0.4);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="circle">
        <i class="fa-solid fa-waveform"></i>
    </div>
    <h1>Neural Map Synchronized!</h1>
    <p>The candidate profile nodes have been written successfully to the RADIX database matrix and configured for evaluations.</p>

    <div class="buttons">
        <a href="/" class="btn home">
            <i class="fa-solid fa-border-all"></i> Dashboard
        </a>
        <a href="/" class="btn new">
            <i class="fa-solid fa-plus"></i> Parse Another
        </a>
    </div>
</div>

</body>
</html>
